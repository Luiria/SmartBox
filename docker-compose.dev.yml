services:

  backend:
    command: npm run dev

    volumes:
      - ./backend:/app
      - /app/node_modules

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"

    stdin_open: true
    tty: true

  mqtt:
      volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log